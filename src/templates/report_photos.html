<!doctype html>
<html lang="en" data-theme="<?!= daisyTheme ?>">
  <head>
    <meta charset="utf-8">
    <title>Quality Control App - [<?= props.appId ?>]</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <? if (daisyTheme && daisyTheme != '') { ?>
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <? } ?>
    <base target="_top">
  </head>

  <body class="bg-base-300 min-h-screen flex flex-col">
    <?!= include('templates/inc.body_header', {props: props, user: user, i18n: i18n}) ?>

    <main class="flex-grow w-full max-w-5xl mx-auto px-2 py-4">
      <div id="toast-container"></div>

      <div class="flex flex-col md:flex-row gap-2">
        <div class="w-full md:p-2 md:w-1/2 bg-base-100 rounded-box">

          <div class="text-center p-2 join w-full">
            <a class="btn btn-default btn-sm btn-square join-item" href="<?= report.url ?>" target="_blank">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 20 20"><path fill="currentColor" d="M15.534 1.36L14.309 0H4.662c-.696 0-.965.516-.965.919v3.63H5.05V1.653c0-.154.13-.284.28-.284h6.903c.152 0 .228.027.228.152v4.82h4.913c.193 0 .268.1.268.246v11.77c0 .246-.1.283-.25.283H5.33a.287.287 0 0 1-.28-.284V17.28H3.706v1.695c-.018.6.302 1.025.956 1.025H18.06c.7 0 .939-.507.939-.969V5.187l-.35-.38l-3.116-3.446Zm-1.698.16l.387.434l2.596 2.853l.143.173h-2.653c-.2 0-.327-.033-.38-.1c-.053-.065-.084-.17-.093-.313V1.52Zm-1.09 9.147h4.577v1.334h-4.578v-1.334Zm0-2.666h4.577v1.333h-4.578V8Zm0 5.333h4.577v1.334h-4.578v-1.334ZM1 5.626v10.667h10.465V5.626H1Zm5.233 6.204l-.64.978h.64V14H3.016l2.334-3.51l-2.068-3.156H5.01L6.234 9.17l1.223-1.836h1.727L7.112 10.49L9.449 14H7.656l-1.423-2.17Z"/></svg>
            </a>
            <a class="btn btn-default btn-sm join-item" href="<?= `${getUrl()}?action=report&id=${report.id}` ?>"><?= i18n.trans('report.tab_checklist') ?></a>
            <a class="btn btn-default btn-sm join-item" disabled><?= i18n.trans('report.tab_photos') ?></a>
            <a class="btn btn-default btn-sm join-item" href="<?= `${getUrl()}?action=report_action_logs&id=${report.id}` ?>"><?= i18n.trans('report.tab_action_logs') ?></a>
          </div>

          <div class="px-2 py-1 bg-info/50">
            <span class="font-semibold"><?= i18n.trans('report.device') ?> </span>
            <span><?= report.name ?></span>
          </div>
        </div>

        <div class="w-full md:w-1/2 bg-base-100 rounded-box p-4">
          <? if (photoData.found) { ?>
            <div class="mb-2">
              <a class="btn btn-sm btn-wide btn-outline" href="<?!= photoData.folderUrl ?>" target="_blank"><?= i18n.trans('photos.open_folder') ?></a> 
              <span class="text-sm ml-2">(<?= photoData.photos.length ?> <?= i18n.trans('photos.count') ?>)</span>
            </div>
          <? } ?>
          <div>
            <a class="btn btn-sm btn-primary btn-wide" disabled href="#"><?= i18n.trans('photos.upload') ?></a>
          </div>
        </div>
      </div>

      <div class="mt-2 w-full bg-base-100 rounded-box p-4">
        <? if (!photoData.found) { ?>
          <div class="alert alert-warning">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span><?= i18n.trans('photos.no_folder') ?></span>
          </div>
        <? } else if (photoData.photos.length === 0) { ?>
          <div class="alert alert-info">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="h-6 w-6 shrink-0 stroke-current">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span><?= i18n.trans('photos.no_photos') ?></span>
          </div>
        <? } else { ?>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
            <? for (let photo of photoData.photos) { ?>
              <div data-photo-id="<?!= photo.id ?>" data-photo-name="<?!= photo.name ?>" data-photo-url="<?!= photo.url ?>">
                <div class="skeleton w-full h-40 rounded-box"></div>
              </div>
            <? } ?>
          </div>
        <? } ?>
      </div>

      <?!= include('templates/inc.main_search', {props: props, user: user, i18n: i18n}) ?>
    </main>

    <?!= include('templates/inc.body_footer', {props: props, i18n: i18n, user: user}) ?>
    <?!= include('frontend/toast.js'); ?>
    <?!= include('frontend/timezone.js', {userProps: user.props, i18n: i18n}); ?>
    <?!= include('frontend/language.js', {i18n: i18n}); ?>
    <?!= include('frontend/cache.js', {i18n: i18n}); ?>
    <?!= include('frontend/report_status_badge.js', {i18n: i18n}); ?>
    <?!= include('frontend/search.js', {i18n: i18n}); ?>
    <?!= include('frontend/report_photos.js'); ?>

  </body>
</html>
