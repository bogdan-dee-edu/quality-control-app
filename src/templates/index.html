<!doctype html>
<html lang="en" data-theme="<?!= daisyTheme ?>">
  <head>
    <meta charset="utf-8">
    <title>Quality Control App - [<?= props.appId ?>]</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <? if (daisyTheme && daisyTheme != '') { ?>
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <? } ?>
    <base target="_top">
  </head>

  <body class="bg-base-300 min-h-screen flex flex-col">
    <?!= include('templates/inc.body_header', {props: props, user: user, i18n: i18n}) ?>

    <main class="flex-grow w-full max-w-5xl mx-auto px-2 py-4">
      <div id="toast-container"></div>

      <div>
        <ul class="list bg-base-200 mb-2">
          <li class="p-2 tracking-wide">
            <?= i18n.trans('home.recent_reports') ?> <button class="btn btn-xs btn-primary float-end" onclick="create_report_modal.showModal();"><?= i18n.trans('home.create_new') ?></button>
          </li>
        </ul>
        <ul class="list bg-base-100 rounded-box shadow-md" id="report_files_list">
          <li class="list-row flex justify-center items-center">
            <span class="skeleton skeleton-text"><?= i18n.trans('home.loading_reports') ?></span>
          </li>
        </ul>
      </div>

      <div class="fab">
        <button class="fab-main-action btn btn-circle btn-lg btn-primary" onclick="create_report_modal.showModal()">
          <svg
            aria-label="New"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
            class="size-6"
          >
            <path
              d="M8.75 3.75a.75.75 0 0 0-1.5 0v3.5h-3.5a.75.75 0 0 0 0 1.5h3.5v3.5a.75.75 0 0 0 1.5 0v-3.5h3.5a.75.75 0 0 0 0-1.5h-3.5v-3.5Z"
            />
          </svg>
        </button>
      </div>

      <dialog id="create_report_modal" class="modal">
        <div class="modal-box">
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
          </form>

          <h3 class="text-lg font-bold"><?= i18n.trans('home.modal_title') ?></h3>
          <form id="create_report_form">
            <div>
              <div data-alert="error"></div>
              <fieldset class="fieldset">
                <legend class="fieldset-legend"><?= i18n.trans('home.serial_legend') ?></legend>
                <input type="text" name="serial" class="input w-full" placeholder="<?= i18n.trans('home.serial_placeholder') ?>" required/>

                <legend class="fieldset-legend"><?= i18n.trans('home.version_legend') ?></legend>
                <select class="select w-full" name="version" required>
                  <option value="" disabled selected><?= i18n.trans('home.version_select') ?></option>
                  <? for (let ver of props.productVersions.split(',')) { ?>
                    <option value="<?= ver ?>"><?= ver ?></option>
                  <? } ?>
                </select>
              </fieldset>
            </div>

            <div class="modal-action justify-center">
              <button type="submit" class="btn btn-wide btn-primary"><?= i18n.trans('home.create_report_btn') ?></button>
            </div>
          </form>
        </div>
      </dialog>

      <?!= include('templates/inc.main_search', {props: props, user: user, i18n: i18n}) ?>
    </main>

    <?!= include('templates/inc.body_footer', {props: props, i18n: i18n, user: user}) ?>
    <?!= include('frontend/toast.js'); ?>
    <?!= include('frontend/timezone.js', {userProps: user.props, i18n: i18n}); ?>
    <?!= include('frontend/language.js', {i18n: i18n}); ?>
    <?!= include('frontend/cache.js', {i18n: i18n}); ?>
    <?!= include('frontend/report_status_badge.js', {i18n: i18n}); ?>
    <?!= include('frontend/search.js', {i18n: i18n}); ?>
    <?!= include('frontend/report_create.js', {i18n: i18n}); ?>
    <?!= include('frontend/reports.js', {i18n: i18n}); ?>
    
    <script>
      window.onload = function () {
        FilesListLoader.init();
        FilesListLoader.run({'excludeStatus': 'completed'});
      }
    </script>

    
  </body>
</html>
