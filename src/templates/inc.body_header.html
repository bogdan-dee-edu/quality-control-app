<header class="shadow">
  <nav class="navbar mx-auto px-2 bg-primary text-primary-content">
    
    <div class="navbar-start">
      <a href="<?= getUrl(); ?>" class="text-xl font-bold"><?= props.appId ?></a>
    </div>

    <div class="navbar-center">
      <ul class="menu menu-horizontal px-1">
        <li><a href="<?= getUrl(); ?>?action=reports"><?= i18n.trans('nav.all_reports') ?></a></li>
      </ul>
    </div>

    <div class="navbar-end gap-2">
      <label class="input input-bordered flex items-center gap-2 w-40 md:w-56 text-base-content">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35m1.15-5.3a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" class="grow" placeholder="<?= i18n.trans('search.placeholder') ?>" onclick="FilesSearcher.showModal();">
      </label>

    </div>

  </nav>

  <div class="flex gap-2 bg-base-200">
    <div class="w-1/2 py-4 px-2">
      <div class="text-sm pt-1 font-semibold"><?= user.full_name ?></div>
      <div class="text-xs pt-2"><?= user.email ?></div>
    </div>
    <div class="w-1/2 py-4 px-2 text-right">
      
      <div class="join">
        <span class="join-item text-xs p-1"><?= i18n.trans('nav.timezone') ?></span>
        <select class="select select-xs w-24 md:w-32 join-item" id="timezones">
          <option><?= i18n.trans('nav.timezone_loading') ?></option>
        </select>
      </div>
      <div class="clear-both"></div>
      <div class="join">
        <span class="join-item text-xs p-1"><?= i18n.trans('nav.language') ?></span>
        <select class="select select-xs w-24 md:w-32 join-item" id="languages">
          <? if (i18n) { ?>
            <? for(let lang of i18n.supportedLangs){ ?>
              <option value="<?!= lang ?>"<?!= (lang == i18n.lang ? ' selected' : '') ?>><?!= lang ?></option>
            <? } ?>
          <? } ?>
        </select>
      </div>

    </div>
  </div>
</header>
