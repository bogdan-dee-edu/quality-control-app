<script>

const FilesListLoader = ((scriptUrl, Toast, ReportCreator) => {
  const mainContainer = document.getElementById("report_files_list");
  const foldersContainer = document.getElementById("report_folders_list");
  const createForm = document.getElementById('create_report_form');
  let loaderHTML = null;


  function init() {
    if (createForm) createForm.addEventListener('submit', ReportCreator.formSubmitListener);
    
    if (foldersContainer) {
      const foldersLinks = foldersContainer.querySelectorAll('a');
      foldersLinks.forEach(folder => {
        folder.addEventListener('click', switchFolderListener);
      });
    }

    loaderHTML = mainContainer.innerHTML;
  }

  function callBackend(params) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => {
          resolve(res);
        })
        .withFailureHandler(reject)
        .runAPI('Report', 'list', params);
    });
  }

  function renderStatusBadge(status) {
    let color = 'neutral';
    switch (status.toLowerCase()) {
      case 'new':
        color = 'warning';
        break;
      case 'failed':
        color = 'error';
        break;
      case 'in_progress':
        color = 'info';
        break;
      case 'completed':
        color = 'success';
        break;
    }
    return `<div class="badge badge-${color} badge-xs shadow-md">${status}</div>`;
  }

  function render(data) {
    let result = false;
    if (data.length > 0) {
      let content = `
      
      `;
      for (item of data) {
        let createdAt = new Date(item.date_created);
        let displayCreatedAt = createdAt.toLocaleString(UserTimeZone.getDefaultLocale(), {timeZone: UserTimeZone.getTimeZoneName()});
        
        content += `
        <li class="list-row">
          
          <div class="list-col-grow">
            <div class="indicator indicator-end w-full">
              <span class="indicator-item mr-4">${renderStatusBadge(item.status)}</span>
              <a href="${scriptUrl}?action=report&id=${item.id}" class="btn btn-block btn-default opacity-90">${item.name}</a>
            </div>
          </div>

          <div class="list-col-wrap">
            <div class="text-xs opacity-60">Created at: ${displayCreatedAt}</div>
          </div>
          
          <a class="btn btn-ghost btn-success btn-square" href="${item.url}" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 20 20"><path fill="currentColor" d="M15.534 1.36L14.309 0H4.662c-.696 0-.965.516-.965.919v3.63H5.05V1.653c0-.154.13-.284.28-.284h6.903c.152 0 .228.027.228.152v4.82h4.913c.193 0 .268.1.268.246v11.77c0 .246-.1.283-.25.283H5.33a.287.287 0 0 1-.28-.284V17.28H3.706v1.695c-.018.6.302 1.025.956 1.025H18.06c.7 0 .939-.507.939-.969V5.187l-.35-.38l-3.116-3.446Zm-1.698.16l.387.434l2.596 2.853l.143.173h-2.653c-.2 0-.327-.033-.38-.1c-.053-.065-.084-.17-.093-.313V1.52Zm-1.09 9.147h4.577v1.334h-4.578v-1.334Zm0-2.666h4.577v1.333h-4.578V8Zm0 5.333h4.577v1.334h-4.578v-1.334ZM1 5.626v10.667h10.465V5.626H1Zm5.233 6.204l-.64.978h.64V14H3.016l2.334-3.51l-2.068-3.156H5.01L6.234 9.17l1.223-1.836h1.727L7.112 10.49L9.449 14H7.656l-1.423-2.17Z"/></svg>
          </a>
          
        </li>`;
      }
      result = true;
      mainContainer.innerHTML = content;
    }

    return result;
  }

  function renderAlert() {
    const alertHtml = `
    <li class="list-row flex justify-center items-center">
      <div role="alert" class="alert alert-default w-full">
        No files found in this folder
      </div>
    </li>
    `;

    mainContainer.innerHTML = alertHtml;
  }

  function switchFolderListener(event) {
    mainContainer.innerHTML = loaderHTML;

    run({'folderId': event.target.getAttribute('data-folder-id')});

    const activeClass = 'menu-active';
    foldersContainer.querySelector(`.${activeClass}`).classList.remove(activeClass);
    event.target.classList.add(activeClass);
  }
  
  function run(params = {}) {
    let dataRendered = false;
    let error = null;

    callBackend(params)
    .then((data) => {
      if (data && data.success) {
        dataRendered = render(data.data);
      } else {
        if (data && data.error) {
          error = data.error;
        } else {
          error = 'Unknown error from API';
        }
      }
    })
    .catch((err) => {
      console.error(err);
      error = err.toString();
    })
    .finally(() => {
      if (error !== null) Toast.showError(error);
      if (! dataRendered) renderAlert();
    });
  }

  return {
    'init': init,
    'run': run,
    'renderStatusBadge': renderStatusBadge
  }

})('<?!= getUrl(); ?>', Toast, ReportCreator);

</script>
