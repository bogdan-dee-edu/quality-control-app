<script>

const UserTheme = ((scriptUrl) => {
  const themesSelector = document.getElementById('themes_selector');

  function init() {
    if (themesSelector) {
      themesSelector.querySelectorAll("[data-set-theme]").forEach(btn => {
        btn.addEventListener("click", changeTheme);
      });
    }
  }

  function changeTheme(event) {
    const theme = event.target.getAttribute("data-set-theme");
    let error = null;

    const callBackend = new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => {
          resolve(res);
        })
        .withFailureHandler(reject)
        .runAPI('Index', 'changeTheme', {'theme': theme});
    });

    Toast.show('Reloading page to apply changes <span class="loading loading-dots loading-xs"></span>');
    callBackend
    .then((data) => {
      if (data && data.success) {
        window.open(scriptUrl,'_top');
      } else {
        if (data && data.error) {
          error = data.error;
        } else {
          error = 'Unknown error from API';
        }
      }
    })
    .catch((err) => {
      console.error(err);
      error = err.toString();
    })
    .finally(() => {
      if (error !== null) Toast.showError(error);
    });
  }

  return {
    'init': init
  }
})("<?= getUrl() ?>");

UserTheme.init();
</script>
